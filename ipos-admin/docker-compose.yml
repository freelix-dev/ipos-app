services:
  ipos-admin:
    image: ghcr.io/freelix-dev/ipos-app-admin:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL นี้ต้องเป็น URL ที่ browser ของ user เข้าถึงได้จาก internet
        VITE_API_BASE_URL: https://ipos.freelix.com.la/api
    ports:
      - "5173:80"
    restart: always
